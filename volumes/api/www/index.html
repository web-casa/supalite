<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SupaLite</title>
  <meta name="description" content="The simplest self-hosted Supabase. Pick your entry point.">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --border-hover: #3ecf8e;
      --text: #e5e5e5;
      --text-muted: #888;
      --brand: #3ecf8e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 700;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 48px;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
      text-align: left;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(62, 207, 142, 0.1);
      color: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 20px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .card-subtitle {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .footer {
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .footer a {
      color: var(--brand);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-mark">s</span>
      SupaLite
    </div>
    <p class="tagline">The simplest self-hosted Supabase. Pick an entry:</p>

    <div class="cards">
      <a class="card" href="/studio/">
        <div class="card-icon">◈</div>
        <div class="card-title">Studio</div>
        <div class="card-desc">
          Table editor · SQL editor · API docs · Auth users · Extensions
        </div>
        <span class="card-subtitle">Application developers</span>
      </a>

      <a class="card" href="/admin/">
        <div class="card-icon">⚙</div>
        <div class="card-title">Admin</div>
        <div class="card-desc">
          System accounts · VACUUM · Backups · Slow queries · Service logs
        </div>
        <span class="card-subtitle">DBA / Ops</span>
      </a>
    </div>

    <p class="footer">
      REST: <code>/rest/v1/</code> · Auth: <code>/auth/v1/</code> · GraphQL: <code>/graphql/v1</code>
    </p>
  </div>
</body>
</html>
